<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Axion Pad — Audio & Macro Controller. Map keys, control volume, export CircuitPython configs." />
  <title>Axion Pad</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --v1: #5B21B6;
      --v2: #7C3AED;
      --m1: #C026D3;
      --m2: #E879F9;
      --grad: linear-gradient(135deg, var(--v2) 0%, var(--m1) 60%, var(--m2) 100%);
      --bg: #05050C;
      --surface: rgba(255, 255, 255, 0.035);
      --border: rgba(255, 255, 255, 0.07);
      --text: #F4F4F5;
      --muted: rgba(244, 244, 245, 0.42);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      overflow: hidden;
    }

    /* ── Canvas stars ───────────────────────────── */
    #stars {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    /* ── Ambient glow behind card ───────────────── */
    .glow {
      position: fixed;
      top: 50%;
      left: 50%;
      translate: -50% -52%;
      width: 520px;
      height: 520px;
      background: radial-gradient(ellipse at center,
        rgba(124, 58, 237, 0.18) 0%,
        rgba(192, 38, 211, 0.10) 40%,
        transparent 70%);
      z-index: 1;
      pointer-events: none;
      animation: pulse 6s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: .7; transform: scale(1); }
      50%       { opacity: 1;  transform: scale(1.08); }
    }

    /* ── Layout ─────────────────────────────────── */
    main {
      position: relative;
      z-index: 2;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    /* ── Card ───────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 56px 48px 48px;
      max-width: 460px;
      width: 100%;
      text-align: center;
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.04) inset,
        0 32px 80px rgba(0,0,0,0.55),
        0 0 60px rgba(124,58,237,0.08);
      animation: rise .9s cubic-bezier(.16,1,.3,1) both;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(24px) scale(.97); }
      to   { opacity: 1; transform: none; }
    }

    /* ── Logo ───────────────────────────────────── */
    .logo-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 28px;
    }

    .logo-wrap svg {
      width: 88px;
      height: 88px;
      filter: drop-shadow(0 0 22px rgba(192,38,211,.5))
              drop-shadow(0 0  8px rgba(124,58,237,.4));
      animation: float 5s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0);   }
      50%       { transform: translateY(-6px); }
    }

    /* ── Typography ─────────────────────────────── */
    h1 {
      font-size: clamp(2rem, 5vw, 2.6rem);
      font-weight: 800;
      letter-spacing: -0.04em;
      line-height: 1.1;
      background: var(--grad);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 12px;
    }

    .tagline {
      font-size: .95rem;
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 36px;
      max-width: 320px;
      margin-inline: auto;
    }

    /* ── Download button ────────────────────────── */
    .btn-download {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: var(--grad);
      color: #fff;
      font-size: .95rem;
      font-weight: 600;
      letter-spacing: .01em;
      padding: 14px 32px;
      border-radius: 14px;
      text-decoration: none;
      border: none;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform .2s, box-shadow .2s;
      box-shadow: 0 4px 24px rgba(192,38,211,.35);
      margin-bottom: 20px;
    }

    .btn-download::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(rgba(255,255,255,.12), rgba(255,255,255,0));
      pointer-events: none;
    }

    .btn-download:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 36px rgba(192,38,211,.5);
    }

    .btn-download:active { transform: translateY(0); }

    .btn-download svg { flex-shrink: 0; }

    /* ── Meta row ───────────────────────────────── */
    .meta {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      font-size: .78rem;
      color: var(--muted);
      flex-wrap: wrap;
    }

    .meta a {
      color: var(--muted);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      transition: color .2s;
    }

    .meta a:hover { color: var(--text); }

    .dot {
      width: 3px; height: 3px;
      border-radius: 50%;
      background: var(--border);
    }

    /* ── Feature pills ──────────────────────────── */
    .pills {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-bottom: 36px;
    }

    .pill {
      font-size: .72rem;
      font-weight: 500;
      letter-spacing: .03em;
      padding: 5px 12px;
      border-radius: 99px;
      background: rgba(124,58,237,.14);
      border: 1px solid rgba(124,58,237,.28);
      color: #C4B5FD;
    }
  </style>
</head>
<body>

<canvas id="stars"></canvas>
<div class="glow"></div>

<main>
  <div class="card">

    <!-- Logo -->
    <div class="logo-wrap">
      <svg viewBox="0 0 88 88" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="lg" x1="0" y1="0" x2="88" y2="88" gradientUnits="userSpaceOnUse">
            <stop offset="0%"   stop-color="#7C3AED"/>
            <stop offset="55%"  stop-color="#C026D3"/>
            <stop offset="100%" stop-color="#E879F9"/>
          </linearGradient>
          <linearGradient id="shine" x1="0" y1="0" x2="60" y2="60" gradientUnits="userSpaceOnUse">
            <stop offset="0%"   stop-color="rgba(255,255,255,0.28)"/>
            <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
          </linearGradient>
          <filter id="inner-glow" x="-15%" y="-15%" width="130%" height="130%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="3" result="blur"/>
            <feFlood flood-color="#E879F9" flood-opacity=".5" result="color"/>
            <feComposite in="color" in2="blur" operator="in" result="shadow"/>
            <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>
        <!-- Organic blob -->
        <path d="M44 6 C28 5 12 18 9 34 C5 52 14 70 30 78 C40 83 54 82 64 75 C76 66 82 50 79 36 C76 20 62 7 44 6 Z"
              fill="url(#lg)"/>
        <!-- Gloss overlay -->
        <path d="M44 6 C28 5 12 18 9 34 C5 52 14 70 30 78 C40 83 54 82 64 75 C76 66 82 50 79 36 C76 20 62 7 44 6 Z"
              fill="url(#shine)" opacity=".6"/>
        <!-- AP lettermark -->
        <text x="44" y="55" text-anchor="middle"
              font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
              font-weight="900" font-size="27" letter-spacing="-1.5"
              fill="white" filter="url(#inner-glow)">AP</text>
      </svg>
    </div>

    <!-- Heading -->
    <h1>Axion Pad</h1>
    <p class="tagline">Configure your sound.<br>Own your workflow.</p>

    <!-- Feature pills -->
    <div class="pills">
      <span class="pill">12 Macro Keys</span>
      <span class="pill">4 Audio Faders</span>
      <span class="pill">CircuitPython</span>
      <span class="pill">DEEJ Compatible</span>
    </div>

    <!-- CTA -->
    <a href="https://github.com/321tutur123/axion-pad/releases/latest" class="btn-download">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/>
        <line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
      Download for Windows
    </a>

    <!-- Meta -->
    <div class="meta">
      <span>v1.0</span>
      <div class="dot"></div>
      <span>Free &amp; Open Source</span>
      <div class="dot"></div>
      <a href="https://github.com/321tutur123/axion-pad" target="_blank" rel="noopener">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/>
        </svg>
        GitHub
      </a>
    </div>

  </div>
</main>

<script>
  // ── Twinkling star field ─────────────────────────────────────────────
  (function () {
    const canvas = document.getElementById('stars');
    const ctx    = canvas.getContext('2d');
    let W, H;

    const COUNT = 220;
    const stars = Array.from({ length: COUNT }, () => ({
      x:     Math.random(),
      y:     Math.random(),
      r:     Math.pow(Math.random(), 2.5) * 1.6 + 0.2,
      phase: Math.random() * Math.PI * 2,
      speed: Math.random() * 0.0008 + 0.0003,
    }));

    function resize() {
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }

    let t = 0;
    function draw() {
      ctx.clearRect(0, 0, W, H);
      const now = t++ * 0.016;
      for (const s of stars) {
        const a = 0.15 + 0.75 * (0.5 + 0.5 * Math.sin(now * s.speed * 60 + s.phase));
        ctx.beginPath();
        ctx.arc(s.x * W, s.y * H, s.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,255,255,${a.toFixed(3)})`;
        ctx.fill();
      }
      requestAnimationFrame(draw);
    }

    window.addEventListener('resize', resize);
    resize();
    draw();
  }());
</script>

</body>
</html>
